name: Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - '*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Install @capacitor/android package
        run: npm install @capacitor/android

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Android platform
        run: npx cap sync android

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Configure Android signing
        run: |
          cd android
          mkdir -p app/signing
          echo "storePassword=android" > app/signing/keystore.properties
          echo "keyPassword=android" >> app/signing/keystore.properties
          echo "keyAlias=androiddebugkey" >> app/signing/keystore.properties
          echo "storeFile=../debug.keystore" >> app/signing/keystore.properties
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -keypass android -storepass android

      - name: Update build.gradle to use signing config
        run: |
          cd android
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android' version '1.8.0'
          }

          android {
              namespace "com.example.wordpracticeapp"
              compileSdk 33

              defaultConfig {
                  applicationId "com.example.wordpracticeapp"
                  minSdk 24
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"

                  testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
                  ndk {
                      abiFilters "arm64-v8a", "x86_64"
                  }
              }

              signingConfigs {
                  debug {
                      storeFile file('../debug.keystore')
                      storePassword 'android'
                      keyAlias 'androiddebugkey'
                      keyPassword 'android'
                  }
                  release {
                      storeFile file('../debug.keystore')
                      storePassword 'android'
                      keyAlias 'androiddebugkey'
                      keyPassword 'android'
                  }
              }

              buildTypes {
                  debug {
                      signingConfig signingConfigs.debug
                  }
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions {
                  jvmTarget = '1.8'
              }
              buildFeatures {
                  viewBinding true
              }
              packagingOptions {
                  exclude 'META-INF/LICENSE.md'
                  exclude 'META-INF/LICENSE-notice.md'
              }
          }

          dependencies {
              implementation project(':capacitor-android')
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.core:core-splashscreen:1.0.1'
              testImplementation 'junit:junit:4.13.2'
              androidTestImplementation 'androidx.test.ext:junit:1.1.5'
              androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
          }
          EOF

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Check APK output directory
        run: |
          ls -la android/app/build/outputs/apk/
          ls -la android/app/build/outputs/apk/release/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: Release ${{ github.ref_name }}
          body: Automatic release of version ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}